<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>U-Pre Gate Harness</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    .controls { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    button { padding: 0.5rem 1rem; cursor: pointer; border: 1px solid #aaa; border-radius: 4px; background: #eee; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .result { border: 1px solid #ccc; padding: 1rem; border-radius: 4px; margin-bottom: 0.5rem; }
    .pass { border-left: 4px solid #0a0; }
    .fail { border-left: 4px solid #c00; }
    .pending { border-left: 4px solid #fa0; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { text-align: left; padding: 0.25rem 0.5rem; border-bottom: 1px solid #ddd; font-size: 0.875rem; }
    th { font-weight: 600; }
    pre { font-size: 0.75rem; background: #f5f5f5; padding: 0.5rem; border-radius: 4px; overflow: auto; }
    .mem { font-style: italic; color: #666; }
  </style>
</head>
<body>
  <h1>U-Pre · Browser Prover Gate Harness</h1>
  <div class="controls">
    <button id="btn-valid" disabled>Run valid R0</button>
    <button id="btn-invalid" disabled>Run invalid witness</button>
    <button id="btn-cancel" disabled>Cancel</button>
  </div>
  <div id="output"></div>
  <div id="summary"></div>
  <script type="module" src="/src/harness/main.ts"></script>
</body>
</html>
